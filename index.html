<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eatsee Menu Portal</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    screens: {
                        'xs': '480px',
                    },
                    colors: {
                        emerald: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            200: '#a7f3d0',
                            300: '#6ee7b7',
                            400: '#34d399',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                            800: '#065f46',
                            900: '#064e3b',
                            950: '#022c22',
                        },
                    },
                    animation: {
                        'float-slow': 'float 20s ease-in-out infinite',
                        'float-medium': 'float 15s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translate(0, 0) scale(1)' },
                            '33%': { transform: 'translate(5%, 5%) scale(1.1)' },
                            '66%': { transform: 'translate(-5%, 2%) scale(0.9)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts: Inter, Manjari, Gayathri -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manjari:wght@400;700&family=Gayathri:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', 'Manjari', sans-serif;
            background-color: #0c2d20;
            background-image: radial-gradient(#0f382a 1px, transparent 1px), radial-gradient(#0f382a 1px, transparent 1px);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            margin: 0;
            padding: 0;
        }
        .malayalam-title {
            font-family: 'Gayathri', 'Manjari', sans-serif;
            text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.4);
        }
        .poster-card {
            border-radius: 40px;
            background-color: #ffffff;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .poster-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
        }
        .custom-scroll::-webkit-scrollbar {
            display: none;
        }
        .custom-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Hide main scrollbar */
        body::-webkit-scrollbar {
            display: none;
        }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
